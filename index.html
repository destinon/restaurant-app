<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Portal</title>
    <!-- Premium Icons Set -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* ==========================================================================
           1. THEME & STRICT DARK MODE VARIABLES (Matching Manager Portal)
           ========================================================================== */
        :root {
            color-scheme: dark;

            --bg-base: #06060a;
            --glass-bg: rgba(22, 22, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-highlight: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --info: #3b82f6;
            
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==========================================================================
           2. GLOBAL RESET & BASE STYLES
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Background Orbs */
        body::before, body::after {
            content: ''; position: absolute; width: 50vw; height: 50vw;
            border-radius: 50%; filter: blur(150px); z-index: -1; opacity: 0.15;
            animation: breathe 20s infinite alternate ease-in-out;
            pointer-events: none;
        }
        body::before { top: -10%; left: -10%; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); }
        body::after { bottom: -10%; right: -10%; background: radial-gradient(circle, var(--info) 0%, transparent 70%); animation-delay: -10s; }

        @keyframes breathe {
            0% { transform: scale(0.8) translate(0, 0); }
            100% { transform: scale(1.2) translate(5vw, 5vw); }
        }

        /* ==========================================================================
           3. LOGIN CARD (Glassmorphism)
           ========================================================================== */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 2rem; font-weight: 500; margin-bottom: 8px; letter-spacing: -0.02em; }
        p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 40px; }

        /* ==========================================================================
           4. BUTTONS
           ========================================================================== */
        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            text-decoration: none;
            transition: var(--transition);
            margin-bottom: 16px;
        }

        .btn:last-child { margin-bottom: 0; }
        .btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }
        
        .btn-primary { 
            background: var(--accent); 
            border-color: var(--accent); 
            box-shadow: 0 4px 15px var(--accent-glow); 
            color: #fff; 
        }
        .btn-primary:hover { background: #7c3aed; }

    </style>
</head>
<body>

    <div class="login-card">
        <div style="font-size: 3.5rem; color: var(--accent); margin-bottom: 20px;">
            <i class="ph-fill ph-intersect"></i>
        </div>
        <h1>Access Portal</h1>
        <p>Select your workspace to continue.</p>
        
        <!-- Redirects to the Manager Dashboard -->
        <a href="manager.html" class="btn btn-primary">
            <i class="ph ph-shield-check" style="font-size: 1.3rem;"></i> Manager Login
        </a>
        
        <!-- Redirects to the future Employee Portal -->
        <a href="employee.html" class="btn">
            <i class="ph ph-user" style="font-size: 1.3rem;"></i> Employee Login
        </a>
    </div>

</body>
</html>
